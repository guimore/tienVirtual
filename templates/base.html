<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi Tienda{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <a href="{{ url_for('index') }}" class="logo">🛍️ MiTienda</a>
        <nav>
            <a href="{{ url_for('index') }}">Inicio</a>
            <a href="{{ url_for('carrito') }}" class="btn-carrito">🛒 Carrito</a>

            {% if session.get('usuario_id') %}
                <span class="usuario">Hola, {{ session['usuario_nombre'] }}</span>
                <a href="{{ url_for('logout') }}">Salir</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('registro') }}">Registro</a>
            {% endif %}
        </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="contenedor">
        {% block contenido %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2025 MiTienda — Hecho con Flask</p>
    </footer>

</body>
</html>
